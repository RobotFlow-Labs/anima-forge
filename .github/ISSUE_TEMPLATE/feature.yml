name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem and use case
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Validation approach
      description: Explain how real-data or hardware claims would be reproduced.
