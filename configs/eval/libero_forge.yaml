# LIBERO Benchmark — FORGE Evaluation Config
# Used by: forge eval run libero --config configs/eval/libero_forge.yaml

server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero:latest
  network: host

benchmarks:
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    mode: sync
    episodes_per_task: 20
    max_tasks: 10
    params:
      suite: libero_spatial
      seed: 42
