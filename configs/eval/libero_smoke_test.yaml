# FORGE × LIBERO Smoke Test — 1 task, 1 episode (quick validation)
# Usage: vla-eval run --config configs/eval/libero_smoke_test.yaml

server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero:latest

output_dir: "./outputs/eval/libero_smoke"

benchmarks:
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    mode: sync
    episodes_per_task: 1
    max_tasks: 1
    params:
      suite: libero_spatial
      seed: 42
      num_steps_wait: 10
