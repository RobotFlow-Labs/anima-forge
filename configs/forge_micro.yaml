# FORGE-Micro Configuration (SmolLM2-135M student)

paths:
  model_dir: ./models
  teacher: openvla--openvla-7b
  vision_encoder: google--siglip2-so400m-patch14-384
  language_model: HuggingFaceTB--SmolLM2-135M
  output_dir: ./outputs
  data_dir: ./data

student:
  variant: micro
  vision_encoder: google/siglip2-so400m-patch14-384
  language_model: HuggingFaceTB/SmolLM2-135M
  backbone_dtype: auto
  bridge_d_vision: 1152
  bridge_d_model: 576
  bridge_n_queries: 64
  bridge_n_heads: 8
  bridge_n_layers: 3
  action_dim: 7
  action_head_layers: 3
  action_diffusion_steps: 10
  lora_rank: 16
  lora_alpha: 32

distill:
  learning_rate: 2e-4
  weight_decay: 0.01
  warmup_steps: 500
  max_steps: 50000
  batch_size: 16
  gradient_accumulation_steps: 4

export:
  formats: [onnx, mlx, tensorrt]
