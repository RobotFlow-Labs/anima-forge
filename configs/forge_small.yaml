# FORGE-Small Configuration (Qwen3-1.7B student)
# Higher quality, needs more VRAM

paths:
  model_dir: ./models
  teacher: openvla--openvla-7b
  vision_encoder: google--siglip2-so400m-patch14-384
  language_model: Qwen--Qwen3-1.7B
  output_dir: ./outputs
  data_dir: ./data

student:
  variant: small
  vision_encoder: google/siglip2-so400m-patch14-384
  language_model: Qwen/Qwen3-1.7B
  backbone_dtype: auto
  bridge_d_vision: 1152
  bridge_d_model: 2048
  bridge_n_queries: 64
  bridge_n_heads: 16
  bridge_n_layers: 6
  action_dim: 7
  action_head_layers: 6
  action_diffusion_steps: 10
  lora_rank: 64
  lora_alpha: 128

distill:
  learning_rate: 1e-4
  max_steps: 80000
  batch_size: 8
  gradient_accumulation_steps: 8

pruning:
  target_layers: 12

export:
  formats: [onnx, mlx, tensorrt]
